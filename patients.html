<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="dashboard">

<div class="sidebar">
<h2>🏥 Hospital</h2>
<a href="/">Dashboard</a>
<a href="/register">Register</a>
</div>

<div class="main">

<form method="get" class="search-box">
<input name="search" placeholder="🔍 Search patient">
<button>Search</button>
</form>

<h2>Patients</h2>

<div class="grid">

{% for p in data %}
<div class="patient-card">
<h3>{{p[1]}}</h3>
<p>Age: {{p[2]}}</p>
<p>Disease: {{p[3]}}</p>
<p>Doctor: {{p[4]}}</p>
<p>Date: {{p[5]}}</p>
</div>
{% endfor %}

</div>

</div>

</div>

</body>
</html>
