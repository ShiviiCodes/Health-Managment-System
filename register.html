<body>

<div class="dashboard">

<div class="sidebar">
<h2>🏥 Hospital</h2>
<a href="/">Dashboard</a>

</div>

<div class="main">

<div class="card">

<h2>📝 Register Patient</h2>

<form method="post">

<input name="name" placeholder="Enter Name" required>
<input name="age" placeholder="Enter Age" required>

<p class="label">Select Symptoms</p>

<div class="checkbox-group">
<label><input type="checkbox" name="symptoms" value="fever"> Fever</label>
<label><input type="checkbox" name="symptoms" value="cough"> Cough</label>
<label><input type="checkbox" name="symptoms" value="headache"> Headache</label>
<label><input type="checkbox" name="symptoms" value="itching"> Itching</label>
</div>

<button type="submit">🚀 Submit</button>

</form>

</div>

</div>

</div>
